function drawSprite(ctx, grid, pal, dx, dy, scale){
  for(let y=0;y<PH;y++){
    for(let x=0;x<PW;x++){
      const v=grid[y]?grid[y][x]||0:0;
      if(v===0)continue;
      ctx.fillStyle=pal[v-1];
      ctx.fillRect(dx+x*scale, dy+y*scale, scale, scale);
    }
  }
}

const GAP=4;
const CELL=PW*S+GAP;
const ROW_H=PH*S+GAP;
const LEFT_PAD=60;
const TOP_PAD=8;

const sheetW=LEFT_PAD+4*CELL+GAP;
const sheetH=TOP_PAD+robots.length*ROW_H+GAP;

const sheet=document.createElement('canvas');
sheet.width=sheetW; sheet.height=sheetH;
sheet.style.width=Math.min(sheetW,640)+'px';
sheet.style.height=Math.round(sheetH*(Math.min(sheetW,640)/sheetW))+'px';
const sc=sheet.getContext('2d');

sc.fillStyle='#111827';
sc.fillRect(0,0,sheetW,sheetH);

sc.font='bold 10px monospace';
sc.fillStyle='#666';
['F1','F2','F3','F4'].forEach((l,i)=>{
  sc.fillText(l, LEFT_PAD+i*CELL+PW*S/2-6, TOP_PAD-2);
});

robots.forEach((rob,ri)=>{
  const oy=TOP_PAD+ri*ROW_H;
  sc.font='bold 9px monospace';
  sc.fillStyle=rob.pal[1];
  sc.fillText(rob.name, 2, oy+PH*S/2+3);

  sc.strokeStyle='#222';
  sc.lineWidth=1;
  sc.strokeRect(LEFT_PAD-2, oy-2, 4*CELL+2, PH*S+4);

  rob.frames.forEach((frame,fi)=>{
    const ox=LEFT_PAD+fi*CELL;
    drawSprite(sc, frame, rob.pal, ox, oy, S);
    sc.strokeStyle='#1e2a3a';
    sc.lineWidth=0.5;
    sc.strokeRect(ox-1, oy-1, PW*S+2, PH*S+2);
  });
});

document.getElementById('sheet-area').appendChild(sheet);

const AS=6;
const ANIM_H=PH*AS+16;
const animW=robots.length*(PW*AS+32)+16;
const animCanvas=document.createElement('canvas');
animCanvas.width=animW; animCanvas.height=ANIM_H;
animCanvas.style.width=animW+'px';
animCanvas.style.height=ANIM_H+'px';
const ac=animCanvas.getContext('2d');
document.getElementById('anim-area').appendChild(animCanvas);

const toggles=document.getElementById('robot-toggles');
const visible=robots.map(()=>true);
robots.forEach((r,i)=>{
  const btn=document.createElement('button');
  btn.textContent=r.name;
  btn.style=`background:${r.pal[1]};color:${r.pal[3]};border:2px solid ${r.pal[0]};font:bold 10px monospace;padding:2px 7px;cursor:pointer;opacity:1`;
  btn.onclick=()=>{
    visible[i]=!visible[i];
    btn.style.opacity=visible[i]?'1':'0.35';
  };
  toggles.appendChild(btn);
});

let frame=0, last=0, fps=8;
document.getElementById('spd').oninput=function(){fps=+this.value;document.getElementById('spd-val').textContent=fps+'fps'};

function animate(ts){
  if(ts-last > 1000/fps){ frame=(frame+1)%4; last=ts; }
  ac.clearRect(0,0,animW,ANIM_H);
  ac.fillStyle='#111827';
  ac.fillRect(0,0,animW,ANIM_H);

  robots.forEach((rob,i)=>{
    if(!visible[i])return;
    const ox=16+i*(PW*AS+32);
    drawSprite(ac, rob.frames[frame], rob.pal, ox, 8, AS);

    ac.font='bold 9px monospace';
    ac.fillStyle=rob.pal[2];
    ac.textAlign='center';
    ac.fillText(rob.name, ox+PW*AS/2, PH*AS+14);
    ac.textAlign='left';
  });

  ac.fillStyle='#333';
  ac.fillRect(0,ANIM_H-3,animW,1);
  const frac=(Date.now()%((1000/fps)*4))/((1000/fps)*4);
  ac.fillStyle='#555';
  ac.fillRect(0,ANIM_H-3,Math.round(frac*animW),2);

  requestAnimationFrame(animate);
}
requestAnimationFrame(animate);
</script>
